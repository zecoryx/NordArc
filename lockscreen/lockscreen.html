<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcZen Locked</title>
    <link rel="stylesheet" href="lockscreen.css">
</head>

<body>
    <div class="glow-bg"></div>

    <div class="content">
        <div class="status-capsule" id="statusCapsule">LOCKED</div>

        <h1 id="mainTitle">Time to Focus</h1>

        <!-- Opal Gem Breathing Element -->
        <div class="gem-container" id="breathingGem">
            <div class="gem-ring"></div>
            <div class="gem-core">
                <span class="gem-label" id="breathingText">START</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="actionBtn">Start Breathing</button>
            <button class="btn btn-secondary" id="closeBtn">Close Tab</button>
        </div>

        <p class="quote" id="quote">"Discipline is choosing between what you want now and what you want most."</p>
    </div>

    <script src="lockscreen.js"></script>
</body>

</html>
